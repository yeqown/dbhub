<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About DB Hub</title>
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/about.css">
</head>
<body>
    <div class="about-container">
        <div class="app-icon">
            <img src="icons/app.png" alt="DB Hub Icon" width="64" height="64">
        </div>
        <h1 class="app-name">DB Hub GUI</h1>
        <p class="app-version">v1.4.1</p>

        <div class="info-grid">
            <div class="info-item">
                <span class="info-label">Version:</span>
                <span class="info-value">1.4.1</span>
            </div>
            <div class="info-item">
                <span class="info-label">License:</span>
                <span class="info-value">MIT</span>
            </div>
            <div class="info-item full-width">
                <span class="info-label">Author:</span>
                <span class="info-value">yeqown@gmail.com</span>
            </div>
            <div class="info-item full-width">
                <span class="info-label">Repository:</span>
                <a href="#" id="repo-link" class="info-link">github.com/yeqown/dbhub</a>
            </div>
        </div>
    </div>

    <script src="about.js"></script>
</body>
</html>
