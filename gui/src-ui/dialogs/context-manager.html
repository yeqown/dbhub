<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Contexts</title>
    <link rel="stylesheet" href="../styles/common.css">
    <link rel="stylesheet" href="../styles/dialogs.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Manage Contexts</h1>
            <button id="add-btn" class="btn-primary">Add Context</button>
        </header>

        <div class="filter-bar">
            <select id="env-filter">
                <option value="">All Environments</option>
            </select>
            <select id="type-filter">
                <option value="">All Types</option>
                <option value="mysql">MySQL</option>
                <option value="mongo">MongoDB</option>
                <option value="redis">Redis</option>
            </select>
            <input type="text" id="search-input" placeholder="Search...">
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>Alias</th>
                    <th>Type</th>
                    <th>Environment</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="context-list">
                <!-- Dynamic content -->
            </tbody>
        </table>
    </div>

    <script type="module" src="context-manager.js"></script>
</body>
</html>
